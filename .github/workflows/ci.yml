name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP-Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Syntaxprüfung aller PHP-Dateien
        run: |
          find . -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -n1 -P4 php -l

  coding-standards:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: PHPCS, WPCS und PHPCompatibilityWP installieren
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            "squizlabs/php_codesniffer:^3.9" \
            "wp-coding-standards/wpcs:^3.1" \
            "phpcompatibility/phpcompatibility-wp:^2.1" \
            "dealerdirect/phpcodesniffer-composer-installer:^1.0"
          echo "$(composer global config home)/vendor/bin" >> "$GITHUB_PATH"

      - name: Coding Standards prüfen
        run: phpcs -q

  build:
    name: ZIP-Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installierbares ZIP bauen
        run: ./build.sh

      - name: ZIP als Artefakt sichern
        uses: actions/upload-artifact@v4
        with:
          name: twint-for-woocommerce
          path: twint-for-woocommerce.zip
          if-no-files-found: error
